  chill:["lo-fi","ambient","jazz","r&b"],intense:["dark trap","action","tension"],
  epic:["orchestral","cinematic","action"],emotional:["ambient","r&b","soul","orchestral"],
  summer:["pop","afrobeats","r&b"],night:["lo-fi","r&b","dark trap","ambient"],

  comeback:["emotional","cinematic","orchestral"],championship:["orchestral","cinematic","epic"],
  documentary:["emotional","cinematic","ambient"],"spider-man":["action","electronic","cinematic"],
  batman:["dark trap","cinematic","tension"],interstellar:["ambient","cinematic","orchestral"],
  nolan:["cinematic","orchestral","tension"],drake:["r&b","hip-hop","trap"],
  piano:["ambient","orchestral","emotional"],"no lyrics":["instrumental","ambient","cinematic"],
};

function search(q, tracks) {
  if (!q.trim()) return [];
  const lq = q.toLowerCase();
  let genres = [];
  for (const [k,v] of Object.entries(SM)) { if (lq.includes(k)) genres=[...genres,...v]; }
  const sc = t => {
    let s=0;
    if ((t.title||"").toLowerCase().includes(lq)) s+=10;
    if ((t.description||"").toLowerCase().includes(lq)) s+=5;
    (t.use_cases||[]).forEach(u=>{if(u.toLowerCase().includes(lq))s+=8;});
    (t.tags||[]).forEach(tag=>{if(tag.toLowerCase().includes(lq))s+=4;if(genres.some(g=>g.toLowerCase()===tag))s+=3;});
    if((t.genre||"").toLowerCase().includes(lq))s+=6;
    if((t.mood||"").toLowerCase().includes(lq))s+=6;
    genres.forEach(g=>{if((t.genre||"").toLowerCase().includes(g))s+=3;});
    return s;
  };
  return tracks.map(t=>({t,s:sc(t)})).filter(x=>x.s>0).sort((a,b)=>b.s-a.s).map(x=>x.t);
}

  useEffect(()=>{loadTracks();loadInbox();},[]);

  const loadTracks=async()=>{
    setLoading(true);
    const {data}=await sb.from("tracks").select("*").order("created_at",{ascending:false});
    if(data)setTracks(data);
    setLoading(false);
  };
  const loadInbox=async()=>{
    const {data}=await sb.from("inquiries").select("*").order("created_at",{ascending:false});
    if(data)setInbox(data);
  };

  const togglePlay=(track,hook=false)=>{
    const id=track.id,audio=audioRefs.current[id];
    if(playing===id&&!hook){audio?.pause();setPlaying(null);return;}
    Object.values(audioRefs.current).forEach(a=>a?.pause());
    setPlaying(id);
    if(audio){if(hook&&track.hook_start&&audio.duration)audio.currentTime=audio.duration*track.hook_start;audio.play().catch(()=>{});}
  };

  const doSearchQ=q=>{setSearchQ(q);if(q.trim().length>1){setSearchRes(search(q,tracks));setSearching(true);}else{setSearching(false);setSearchRes([]);}};

  const uploadFile=async(file,bucket,folder)=>{
    if(!file)return null;
    const ext=file.name.split(".").pop(),path=`${folder}/${Date.now()}_${uid()}.${ext}`;
    const{error}=await sb.storage.from(bucket).upload(path,file,{upsert:true});
    if(error)throw new Error(error.message);
    return sb.storage.from(bucket).getPublicUrl(path).data.publicUrl;
  };

  const handleUpload=async()=>{
    if(!uF.title){setUpErr("Title required.");return;}
    if(!uF.genre){setUpErr("Genre required.");return;}
    if(!uF.mood){setUpErr("Mood required.");return;}
    if(!uF.bpm){setUpErr("BPM required.");return;}
    if(!fMain){setUpErr("Master audio file required.");return;}
    setUpErr("");setUploading(true);
    try{
      const tid=`track_${Date.now()}`;
      setUpProg("Uploading master audio...");const masterUrl=await uploadFile(fMain,"audio",tid);
      setUpProg("Uploading instrumental...");const instUrl=await uploadFile(fInst,"audio",tid);
      setUpProg("Uploading clean version...");const cleanUrl=await uploadFile(fClean,"audio",tid);
      setUpProg("Uploading 30s loop...");const l30Url=await uploadFile(fL30,"audio",tid);
      setUpProg("Uploading 60s cut...");const l60Url=await uploadFile(fL60,"audio",tid);
      setUpProg("Uploading artwork...");const artUrl=await uploadFile(fArt,"artwork",tid);
      setUpProg("Saving to database...");
      const{error}=await sb.from("tracks").insert({
        title:uF.title.toUpperCase().trim(),genre:uF.genre,mood:uF.mood.trim(),
        bpm:parseInt(uF.bpm)||120,key:uF.key.trim(),duration:uF.dur.trim(),hook_start:uF.hook,
        price_sync:parseInt(uF.psync)||300,price_bundle:parseInt(uF.pbundle)||450,price_exclusive:parseInt(uF.pexcl)||2000,
        description:uF.desc.trim(),use_case_1:uF.uc1.trim(),
        use_cases:uF.ucs.split(",").map(s=>s.trim()).filter(Boolean),
        tags:uF.tags.split(",").map(s=>s.trim().toLowerCase()).filter(Boolean),
        section:uF.section,gradient:artUrl?null:uF.grad,artwork_url:artUrl,

            </div>

            {upErr&&<p style={{color:D.red,fontSize:11,marginBottom:7}}>⚠ {upErr}</p>}
            {upProg&&<p style={{color:D.gold,fontSize:11,marginBottom:7,display:"flex",alignItems:"center",gap:6}}><span style={{display:"inline-block",width:11,height:11,border:`2px solid ${D.gold}40`,borderTop:`2px solid ${D.gold}`,borderRadius:"50%",animation:"spin .8s linear infinite"}}/>{upProg}</p>}
            <Btn full ch={uploading?"Uploading...":"Add Track to Catalog →"} v="gold" disabled={uploading} sx={{padding:10,fontSize:12}} onClick={handleUpload}/>
          </div>}
        </div>

        {/* Inbox */}
        <div style={{marginBottom:28}}>
          <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:10}}>
            <h3 style={{fontFamily:"'Bebas Neue',sans-serif",fontSize:18,letterSpacing:2,color:D.text}}>Sync Request Inbox</h3>
            {pending>0&&<Tag label={`${pending} Pending`}/>}
          </div>
          <div style={{display:"flex",flexDirection:"column",gap:5}}>
            {inbox.map(req=><div key={req.id} style={{background:D.bg2,border:"1px solid",borderRadius:7,padding:"11px 15px",borderColor:req.status==="pending"?D.gold+"44":D.border}}>
              <div style={{display:"grid",gridTemplateColumns:"1fr auto",gap:12,alignItems:"flex-start"}}>
                <div>
                  <div style={{display:"flex",gap:7,alignItems:"center",marginBottom:4,flexWrap:"wrap"}}>
                    <span style={{fontWeight:700,fontSize:13,color:D.text}}>{req.name}</span>
                    <span style={{color:D.border3}}>·</span>
                    <span style={{color:D.text2,fontSize:11}}>{req.company}</span>
                    <Tag label={(req.status||"pending").toUpperCase()} c={scol[req.status||"pending"]}/>
                  </div>
                  <div style={{display:"flex",gap:5,flexWrap:"wrap",marginBottom:3}}>
                    <Tag label={`↳ ${req.track_title||req.track||""}`}/>
                    {req.medium&&<Tag label={req.medium} c={D.text3}/>}
                  </div>
                  <p style={{color:D.text3,fontSize:10}}><b style={{color:D.text2}}>Project:</b> {req.project}</p>
                  {req.notes&&<p style={{color:D.text4,fontSize:10,fontStyle:"italic"}}>"{req.notes}"</p>}
                </div>
                <div style={{display:"flex",flexDirection:"column",gap:4,minWidth:86}}>
                  <Btn sm ch="✉ Reply" v="gold" onClick={()=>window.open(`mailto:${req.email}?subject=${encodeURIComponent(`Re: "${req.track_title||req.track}" | CURATED`)}`)}/>
                  {["reviewing","approved","declined"].map(s=><Btn key={s} sm ch={s[0].toUpperCase()+s.slice(1)} v={s==="approved"?"green":s==="declined"?"red":"ghost"} sx={{justifyContent:"center"}} onClick={()=>updateStatus(req.id,s)}/>)}
                </div>
              </div>
            </div>)}
            {inbox.length===0&&<div style={{textAlign:"center",padding:"22px",color:D.text4,border:`1px dashed ${D.border}`,borderRadius:7,fontSize:11}}>No requests yet.</div>}
          </div>
        </div>

        {/* Catalog */}
        <div>
          <h3 style={{fontFamily:"'Bebas Neue',sans-serif",fontSize:18,letterSpacing:2,color:D.text,marginBottom:10}}>Track Catalog ({tracks.length})</h3>
          <div style={{display:"flex",flexDirection:"column",gap:5}}>
            {tracks.map(t=>{const art=t.artwork_url||t.gradient||GRADS[0],isImg=art.startsWith("http");return<div key={t.id} style={{background:D.bg2,border:`1px solid ${D.border}`,borderRadius:7,padding:"10px 13px",display:"flex",justifyContent:"space-between",alignItems:"center",gap:12}}>
              <div style={{display:"flex",gap:10,alignItems:"center",flex:1,minWidth:0}}>
                <div style={{width:36,height:36,borderRadius:5,background:isImg?"#111":art,flexShrink:0,overflow:"hidden",position:"relative"}}>
                  {isImg&&<img src={art} alt="" style={{width:"100%",height:"100%",objectFit:"cover"}}/>}
                  {t.audio_master_url&&<div style={{position:"absolute",bottom:2,right:2,width:5,height:5,borderRadius:"50%",background:D.green}}/>}
                </div>
                <div style={{minWidth:0}}>
                  <div style={{fontFamily:"'Bebas Neue',sans-serif",fontSize:13,letterSpacing:1.5,color:D.text}}>{t.title}</div>
                  <div style={{display:"flex",gap:3,marginTop:2,flexWrap:"wrap"}}><Tag label={t.genre} sm/><Tag label={t.mood} c={D.text3} sm/><Tag label={`${t.bpm} BPM`} c={D.text4} sm/></div>
                </div>
              </div>
              <div style={{display:"flex",gap:7,alignItems:"center",flexShrink:0}}>
                <span style={{fontFamily:"'IBM Plex Mono',monospace",fontSize:11,color:D.gold,fontWeight:700}}>${t.price_sync}</span>
                <Btn sm ch="Remove" v="red" onClick={()=>deleteTrack(t.id)}/>
              </div>
            </div>;})}
            {tracks.length===0&&<div style={{textAlign:"center",padding:"24px",color:D.text4,border:`1px dashed ${D.border}`,borderRadius:7,fontSize:11}}>No tracks yet.</div>}
          </div>
        </div>
      </>}
    </div>}

    {/* Mini player */}
    {playing&&(()=>{const t=tracks.find(x=>x.id===playing);if(!t)return null;const art=t.artwork_url||t.gradient||GRADS[0],isImg=art.startsWith("http");return<div style={{position:"fixed",bottom:0,left:0,right:0,zIndex:5000,background:"linear-gradient(to right,#0D0D0D,#111)",borderTop:`1px solid ${D.border2}`,padding:"9px 22px",display:"flex",alignItems:"center",gap:14,boxShadow:"0 -6px 28px rgba(0,0,0,.7)"}}>
      <div onClick={()=>setSelected(t)} style={{width:38,height:38,borderRadius:6,background:isImg?"#111":art,flexShrink:0,cursor:"pointer",overflow:"hidden",position:"relative"}}>{isImg&&<img src={art} alt="" style={{width:"100%",height:"100%",objectFit:"cover"}}/>}</div>
      <div style={{minWidth:130,flexShrink:0,cursor:"pointer"}} onClick={()=>setSelected(t)}>
        <div style={{fontFamily:"'Bebas Neue',sans-serif",fontSize:14,letterSpacing:1.5,color:D.text,lineHeight:1}}>{t.title}</div>
        <div style={{fontSize:9,color:D.text3,marginTop:1}}>{t.genre} · {t.bpm} BPM</div>
      </div>
      <button onClick={()=>{audioRefs.current[playing]?.pause();setPlaying(null);}} style={{width:32,height:32,borderRadius:"50%",background:`linear-gradient(135deg,${D.gold},${D.goldL})`,border:"none",color:"#0B0B0B",fontSize:12,display:"flex",alignItems:"center",justifyContent:"center",cursor:"pointer",flexShrink:0}}>▮▮</button>
      <div style={{flex:1,display:"flex",flexDirection:"column",gap:3}}>
        <div style={{height:2,background:D.bg5,borderRadius:1}}><div style={{width:`${(prog[playing]||0)*100}%`,height:"100%",background:`linear-gradient(to right,${D.gold},${D.goldL})`,borderRadius:1,transition:"width .1s"}}/></div>
        <div style={{fontSize:8,color:D.text4}}>{t.bpm} BPM · {t.key||""} · {t.duration||""}</div>
      </div>
      <div style={{display:"flex",gap:6,flexShrink:0}}>
        <Btn ch="License →" v="gold" sm onClick={()=>setLicModal(t)}/>
      </div>
    </div>;})()}

    {/* Track detail */}
    {selected&&(()=>{const art=selected.artwork_url||selected.gradient||GRADS[0],isImg=art.startsWith("http");return<Modal wide title={selected.title} sub={`${selected.genre} · ${selected.mood} · ${selected.bpm} BPM`} onClose={()=>setSelected(null)}>
      <div style={{display:"grid",gridTemplateColumns:"150px 1fr",gap:16,marginBottom:16}}>
        <div style={{borderRadius:9,aspectRatio:"1",background:isImg?"#111":art,overflow:"hidden",boxShadow:"0 6px 28px rgba(0,0,0,.6)"}}>
          {isImg&&<img src={art} alt="" style={{width:"100%",height:"100%",objectFit:"cover"}}/>}
        </div>
        <div>
          <div style={{marginBottom:8}}><Badges t={selected}/></div>
          <p style={{color:D.text2,fontSize:12,lineHeight:1.75,marginBottom:10}}>{selected.description}</p>
          {selected.use_cases?.length>0&&<div style={{display:"flex",gap:5,flexWrap:"wrap",marginBottom:10}}>{selected.use_cases.map(u=><Tag key={u} label={u} c={D.text3}/>)}</div>}
          <div style={{background:D.bg3,border:`1px solid ${D.border}`,borderRadius:6,padding:"9px 11px",marginBottom:10}}>
            <div style={{fontSize:9,color:D.gold,letterSpacing:1.5,textTransform:"uppercase",fontWeight:700,marginBottom:5}}>Pack Includes</div>
            <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:3}}>
              {[["WAV Master",true],["Instrumental",selected.pack_instrumental],["Clean",selected.pack_clean],["30s Loop",selected.pack_loop30],["60s Cut",selected.pack_loop60]].map(([l,v])=><div key={l} style={{fontSize:9,color:v?D.text2:D.text4,display:"flex",alignItems:"center",gap:4}}><span style={{color:v?D.green:D.text4,fontWeight:700}}>{v?"✓":"—"}</span>{l}</div>)}
            </div>
          </div>
          <div style={{display:"flex",alignItems:"center",gap:9}}>
            <button onClick={()=>togglePlay(selected)} style={{width:34,height:34,borderRadius:"50%",background:`linear-gradient(135deg,${D.gold},${D.goldL})`,border:"none",color:"#0B0B0B",fontSize:12,display:"flex",alignItems:"center",justifyContent:"center",cursor:"pointer",flexShrink:0}}>{playing===selected.id?"▮▮":"▶"}</button>
            <div style={{flex:1,height:2,background:D.bg5,borderRadius:1}}><div style={{width:`${(prog[selected.id]||0)*100}%`,height:"100%",background:`linear-gradient(to right,${D.gold},${D.goldL})`,borderRadius:1,transition:"width .1s"}}/></div>
            <button onClick={()=>togglePlay(selected,true)} style={{background:D.bg3,border:`1px solid ${D.border2}`,color:D.text3,fontSize:8,padding:"3px 9px",borderRadius:20,cursor:"pointer",fontWeight:700,letterSpacing:.5,textTransform:"uppercase",whiteSpace:"nowrap"}}>▶▶ Hook</button>
          </div>
        </div>
      </div>
      <div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr",gap:8,marginBottom:12}}>
        {[{id:"sync",l:"Sync License",p:selected.price_sync,d:"One project"},{id:"bundle",l:"Bundle Pack",p:selected.price_bundle,d:"All 5 files"},{id:"exclusive",l:"Exclusive",p:selected.price_exclusive,d:"Full buyout"}].map(tier=><div key={tier.id} style={{background:D.bg3,border:`1px solid ${D.border2}`,borderRadius:7,padding:"11px",textAlign:"center",cursor:"pointer"}} onMouseEnter={e=>e.currentTarget.style.borderColor=D.gold} onMouseLeave={e=>e.currentTarget.style.borderColor=D.border2}>
          <div style={{fontSize:9,fontWeight:700,color:D.text,letterSpacing:.5,marginBottom:3,textTransform:"uppercase"}}>{tier.l}</div>
          <div style={{fontFamily:"'IBM Plex Mono',monospace",fontSize:18,fontWeight:700,color:D.gold,marginBottom:2}}>${tier.p}</div>
          <div style={{fontSize:8,color:D.text4}}>{tier.d}</div>
        </div>)}
      </div>
      <div style={{display:"flex",gap:8}}>
        <Btn full ch="License This Track →" v="gold" onClick={()=>{setLicModal(selected);setSelected(null);}} sx={{flex:1,padding:10}}/>
        <Btn ch="Contact Creator" v="ghost" onClick={()=>{setConF({name:"",company:"",role:"",project:"",medium:"",scene:"",notes:"",email:""});setConDone(false);setConModal(selected);setSelected(null);}} sx={{padding:10}}/>
      </div>
    </Modal>;})()}

    {/* License modal */}
    {licModal&&<Modal title="License This Track" sub={`"${licModal.title}"`} onClose={()=>setLicModal(null)}>
      <div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr",gap:8,marginBottom:16}}>
        {[{id:"sync",l:"Sync",p:licModal.price_sync,d:"One project"},{id:"bundle",l:"Bundle",p:licModal.price_bundle,d:"All 5 files"},{id:"exclusive",l:"Exclusive",p:licModal.price_exclusive,d:"Full buyout"}].map(tier=><div key={tier.id} onClick={()=>setLicTier(tier.id)} style={{background:licTier===tier.id?D.gold+"14":D.bg3,border:`1px solid ${licTier===tier.id?D.gold:D.border2}`,borderRadius:7,padding:"12px",cursor:"pointer",textAlign:"center",transition:"all .15s"}}>
          <div style={{fontSize:9,fontWeight:700,color:D.text,letterSpacing:.5,marginBottom:3,textTransform:"uppercase"}}>{tier.l}</div>
          <div style={{fontFamily:"'IBM Plex Mono',monospace",fontSize:17,fontWeight:700,color:licTier===tier.id?D.goldL:D.text,marginBottom:2}}>${tier.p}</div>
          <div style={{fontSize:8,color:D.text4}}>{tier.d}</div>
        </div>)}
      </div>
      <div style={{height:1,background:D.border,margin:"12px 0"}}/>
      <Fld label="Full Name *" value={buyerF.name} onChange={e=>setBuyerF(b=>({...b,name:e.target.value}))} placeholder="Chris Davis"/>
      <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:9}}><Fld label="Label / Company" value={buyerF.company} onChange={e=>setBuyerF(b=>({...b,company:e.target.value}))} placeholder="Def Jam"/><Fld label="Artist" value={buyerF.artist} onChange={e=>setBuyerF(b=>({...b,artist:e.target.value}))} placeholder="Stage name"/></div>
      <Fld label="Project" value={buyerF.project} onChange={e=>setBuyerF(b=>({...b,project:e.target.value}))} placeholder="Debut EP"/>
      <Fld label="Email *" type="email" value={buyerF.email} onChange={e=>setBuyerF(b=>({...b,email:e.target.value}))} placeholder="you@label.com"/>
      <Btn full ch="Generate Contract →" v="gold" disabled={!buyerF.name||!buyerF.email} sx={{marginTop:5,padding:10,fontSize:12}} onClick={()=>{setCtModal({text:contract(licModal,licTier,buyerF)});setLicModal(null);}}/>
    </Modal>}

    {/* Contact modal */}
    {conModal&&<Modal title="Contact Creator" sub={`Sync inquiry for "${conModal.title}"`} onClose={()=>setConModal(null)}>
      {conDone?<div style={{textAlign:"center",padding:"16px 0"}}>
        <div style={{width:42,height:42,borderRadius:"50%",background:D.gold+"18",border:`1px solid ${D.gold+"38"}`,display:"flex",alignItems:"center",justifyContent:"center",margin:"0 auto 12px",fontSize:18,color:D.gold}}>✓</div>
        <h3 style={{fontFamily:"'Bebas Neue',sans-serif",fontSize:20,letterSpacing:2,color:D.text,marginBottom:6}}>Request Sent</h3>
        <p style={{color:D.text3,fontSize:12,lineHeight:1.9}}>Expect a response at <b style={{color:D.text}}>{conF.email}</b> within 48 hours.</p>
        <Btn ch="Done" v="gold" sx={{marginTop:14}} onClick={()=>setConModal(null)}/>
      </div>:<>
        <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:9}}><Fld label="Full Name *" value={conF.name} onChange={e=>setConF(f=>({...f,name:e.target.value}))} placeholder="Jordan Ellis"/><Fld label="Company *" value={conF.company} onChange={e=>setConF(f=>({...f,company:e.target.value}))} placeholder="Paramount"/></div>
        <Fld label="Your Role" as="select" value={conF.role} onChange={e=>setConF(f=>({...f,role:e.target.value}))}><option value="">Select...</option>{["Music Supervisor","Director","Producer","Ad Agency","Game Studio","Creator","Other"].map(r=><option key={r}>{r}</option>)}</Fld>
        <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:9}}><Fld label="Project" value={conF.project} onChange={e=>setConF(f=>({...f,project:e.target.value}))} placeholder="Feature Film"/><Fld label="Medium" as="select" value={conF.medium} onChange={e=>setConF(f=>({...f,medium:e.target.value}))}><option value="">Select...</option>{["Film","TV","Streaming","Ad","YouTube","Video Game","Other"].map(m=><option key={m}>{m}</option>)}</Fld></div>
        <Fld label="Scene / Use" value={conF.scene} onChange={e=>setConF(f=>({...f,scene:e.target.value}))} placeholder="Opening title, villain entrance..."/>
        <Fld as="textarea" label="Notes" value={conF.notes} onChange={e=>setConF(f=>({...f,notes:e.target.value}))}/>
        <Fld label="Email *" type="email" value={conF.email} onChange={e=>setConF(f=>({...f,email:e.target.value}))} placeholder="you@studio.com"/>
        <Btn full ch="Submit Inquiry →" v="gold" disabled={!conF.name||!conF.email||!conF.company} sx={{marginTop:5,padding:10,fontSize:12}} onClick={submitCon}/>
      </>}
    </Modal>}

    {/* Contract modal */}
    {ctModal&&<Modal wide title="Licensing Agreement" sub="Download · Sign · Return to creator" onClose={()=>setCtModal(null)}>
      <div style={{display:"flex",gap:7,marginBottom:10}}>
        <Btn ch="⬇ Download" v="gold" onClick={()=>{const b=new Blob([ctModal.text],{type:"text/plain"});const a=document.createElement("a");a.href=URL.createObjectURL(b);a.download=`CURATED_${uid()}.txt`;a.click();}}/>
        <Btn ch="Copy" v="ghost" onClick={()=>navigator.clipboard?.writeText(ctModal.text)}/>
      </div>
      <pre style={{background:D.bg3,border:`1px solid ${D.border}`,borderRadius:6,padding:13,fontSize:9,lineHeight:1.85,color:D.text3,overflowX:"auto",whiteSpace:"pre-wrap",fontFamily:"'IBM Plex Mono',monospace",maxHeight:380,overflowY:"auto"}}>{ctModal.text}</pre>
      <p style={{marginTop:8,color:D.text4,fontSize:9,lineHeight:1.7}}>⚠ For deals above $10,000 consult a licensed music attorney.</p>
    </Modal>}
  </>;
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
